name: CI Tests
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    if: ${{ !github.event.repository.is_template }}
    steps:
      - uses: actions/checkout@v4
      - name: test successfully builds (23 pts)
        if: ${{ !cancelled() }}
        run: |
          make clean
          make
      - name: Setup 1 Initial tests of loading and converting page file streams (10 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [setup1] | grep . && ./test [setup1]
      - name: Task 1 PagingSystem accessor methods (17 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task1] | grep . && ./test [task1]
      - name: Task 2 isMemoryFull() member method (5 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task2] | grep . && ./test [task2]
      - name: Task 3 isPageHit() member method (10 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task3] | grep . && ./test [task3]
      - name: Task 4 doPagePlacement() member function (10 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task4] | grep . && ./test [task4]
      - name: Task 5 enable Fifo PagingSystem simulations (5 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task5] | grep . && ./test [task5]
      - name: Task 6 ClockPageReplacementScheme resetScheme member method initializations (5 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task6] | grep . && ./test [task6]
      - name: Task 7 ClockPageReplacementScheme pageHit member method (5 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task7] | grep . && ./test [task7]
      - name: Task 8 ClockPageReplacementScheme makeReplacementDecision member method (5 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./test --list-test-names-only [task8] | grep . && ./test [task8]
      - name: system tests (5 pts)
        if: ${{ !cancelled() }}
        run: |
          make
          ./scripts/run-system-tests
